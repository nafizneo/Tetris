<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Pro | Logic & AI Demo</title>
    <link rel="stylesheet" href="./style.css"/>
</head>
<body>

<div id="game-container">
    <!-- Left Side: Hold -->
    <div class="side-panel">
        <div class="stats-box">
            <div class="label">Hold</div>
            <canvas id="hold-canvas" width="100" height="100"></canvas>
        </div>
        <div class="stats-box">
            <div class="label">Level</div>
            <div id="level" class="value">1</div>
        </div>
        <div class="stats-box">
            <div class="label">Lines</div>
            <div id="lines" class="value">0</div>
        </div>
    </div>

    <!-- Center: Main Board -->
    <div style="position: relative;">
        <canvas id="tetris" width="300" height="600"></canvas>
    </div>

    <!-- Right Side: Next & Score -->
    <div class="side-panel">
        <div class="stats-box">
            <div class="label">Next</div>
            <canvas id="next-canvas" width="100" height="100"></canvas>
        </div>
        <div class="stats-box">
            <div class="label">Score</div>
            <div id="score" class="value">0</div>
        </div>
        <div class="stats-box">
            <div class="label">Status</div>
            <div id="status" style="font-weight: bold;">READY</div>
            <div id="ai-status" class="ai-badge">AI PILOT</div>
        </div>
        <button id="ai-toggle" style="margin-top: auto; padding: 10px; cursor: pointer;">Toggle AI (A)</button>
    </div>

    <div class="controls">
        <span>WASD/Arrows: Move/Rotate | Space: Hard Drop | C: Hold | A: Toggle AI</span>
        <span>Super Rotation System (SRS) Active</span>
    </div>
</div>

<script src="./game.js"> </script>
</body>
</html>
