<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Pro | Logic & AI Demo</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161e;
            --text: #c0caf5;
            --accent: #7aa2f7;
            --ghost: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            display: grid;
            grid-template-columns: 150px 320px 200px;
            gap: 20px;
            padding: 20px;
            background: var(--panel);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stats-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2f334d;
        }

        .label { font-size: 12px; color: #565f89; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 24px; font-weight: bold; color: var(--accent); }

        canvas {
            background: #1a1b26;
            border: 2px solid #2f334d;
            border-radius: 4px;
            display: block;
        }

        #hold-canvas, #next-canvas { background: transparent; border: none; }

        .controls {
            grid-column: span 3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
            color: #565f89;
        }

        .ai-badge {
            background: #f7768e;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
        }
        
        .ai-active .ai-badge { display: inline-block; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Left Side: Hold -->
    <div class="side-panel">
        <div class="stats-box">
            <div class="label">Hold</div>
            <canvas id="hold-canvas" width="100" height="100"></canvas>
        </div>
        <div class="stats-box">
            <div class="label">Level</div>
            <div id="level" class="value">1</div>
        </div>
        <div class="stats-box">
            <div class="label">Lines</div>
            <div id="lines" class="value">0</div>
        </div>
    </div>

    <!-- Center: Main Board -->
    <div style="position: relative;">
        <canvas id="tetris" width="300" height="600"></canvas>
    </div>

    <!-- Right Side: Next & Score -->
    <div class="side-panel">
        <div class="stats-box">
            <div class="label">Next</div>
            <canvas id="next-canvas" width="100" height="100"></canvas>
        </div>
        <div class="stats-box">
            <div class="label">Score</div>
            <div id="score" class="value">0</div>
        </div>
        <div class="stats-box">
            <div class="label">Status</div>
            <div id="status" style="font-weight: bold;">READY</div>
            <div id="ai-status" class="ai-badge">AI PILOT</div>
        </div>
        <button id="ai-toggle" style="margin-top: auto; padding: 10px; cursor: pointer;">Toggle AI (A)</button>
    </div>

    <div class="controls">
        <span>WASD/Arrows: Move/Rotate | Space: Hard Drop | C: Hold | A: Toggle AI</span>
        <span>Super Rotation System (SRS) Active</span>
    </div>
</div>

<script src="./game.js">
</script>
</body>
</html>
